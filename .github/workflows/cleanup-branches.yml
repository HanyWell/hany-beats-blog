name: Cleanup merged branches

on:
  pull_request:
    types: [closed]
  schedule:
    - cron: '0 3 * * 1'  # každé pondeli o 3:00 UTC

permissions:
  contents: write

jobs:
  delete-merged-branch:
    name: Zmazať mergnutý branch
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Zmazať head branch po merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.payload.pull_request.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Nemaže main branch
            if (branch === 'main') return;

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              console.log(`Branch '${branch}' bol úspešne zmazaný.`);
            } catch (err) {
              console.log(`Branch '${branch}' sa nepodarilo zmazať: ${err.message}`);
            }

  cleanup-stale-branches:
    name: Vyčistiť stale branches
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Zmazať mergnuté branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Získaj všetky zatvorené/mergnuté PR-y
            const { data: closedPRs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'closed',
              per_page: 100,
            });

            const mergedPRs = closedPRs.filter(pr => pr.merged_at !== null);

            for (const pr of mergedPRs) {
              const branch = pr.head.ref;
              if (branch === 'main') continue;

              // Overí, či branch stále existuje
              try {
                await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
              } catch {
                // Branch už neexistuje
                continue;
              }

              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch}`,
                });
                console.log(`Stale branch '${branch}' bol zmazaný.`);
              } catch (err) {
                console.log(`Nepodarilo sa zmazať branch '${branch}': ${err.message}`);
              }
            }
